name: Nginx and S3 Deploy
on:
  push:
    branches: [ "main" ]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: 소스 코드 가져오기
        uses: actions/checkout@v4

      # [1단계] EC2 Nginx 배포 (SCP로 홈 디렉토리에 전송)
      - name: 파일을 서버 홈으로 전송
        uses: appleboy/scp-action@master
        with:
          host: ${{ secrets.NGINX_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.NGINX_SSH_KEY }}
          port: 22
          source: "html/*"
          target: "/home/${{ secrets.EC2_USER }}"
          strip_components: 1

      # [2단계] SSH로 접속하여 sudo 권한으로 파일 이동 및 Nginx 재시작
      - name: sudo 권한으로 파일 이동
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.NGINX_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.NGINX_SSH_KEY }}
          port: 22
          script: |
            sudo cp -rf /home/${{ secrets.EC2_USER }}/* /usr/share/nginx/html/
            sudo systemctl restart nginx
            echo "EC2 배포 완료!"

      # [3단계] AWS 자격 증명 설정 (뭄바이 리전 기준)
      - name: AWS 자격 증명 설정
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ap-south-1 # 뭄바이 리전

      # [4단계] S3 버킷으로 파일 동기화
      - name: S3 버킷으로 파일 업로드
        run: |
          aws s3 sync html/ s3://pwotc.cloud/ --delete
          echo "S3 배포 완료!"
